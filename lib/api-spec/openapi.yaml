openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification for Dip Tracker - securities that have fallen in price
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: securities
    description: Securities (equities and crypto) that have fallen in price
  - name: verdicts
    description: Valuation and fundamental momentum verdicts for stock tickers
  - name: news
    description: Recent company news articles for a ticker
  - name: drop-cause
    description: Why a security dropped — sector-relative move + cause classification
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /news/{ticker}:
    get:
      operationId: getTickerNews
      tags: [news]
      summary: Recent news articles for a ticker
      description: Returns up to 3 most recent company news articles from the last 7 days. Cached per ticker for 30 minutes. Stock tickers only — crypto returns empty.
      parameters:
        - name: ticker
          in: path
          required: true
          description: Stock ticker symbol (e.g. AAPL, MSFT)
          schema:
            type: string
      responses:
        "200":
          description: News articles for the ticker
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /securities/by-tickers:
    get:
      operationId: getSecuritiesByTickers
      tags: [securities]
      summary: Get current price data for specific tickers
      description: Returns current price data for a comma-separated list of tickers. Uses the 24h period cache. Useful for watchlists — tickers are returned even if they are not currently falling.
      parameters:
        - name: tickers
          in: query
          required: true
          description: "Comma-separated list of ticker symbols (max 50)"
          schema:
            type: string
      responses:
        "200":
          description: Price data for the requested tickers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecuritiesResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /securities:
    get:
      operationId: listSecurities
      tags: [securities]
      summary: List securities that have fallen in price
      description: Returns a filtered list of equities and crypto that have dropped by specified criteria. Data refreshes every 15 minutes.
      parameters:
        - name: assetType
          in: query
          required: false
          description: "Filter by asset type: equity or crypto"
          schema:
            type: string
            enum: [equity, crypto]
        - name: market
          in: query
          required: false
          description: "Filter by market/exchange"
          schema:
            type: string
            enum: [NASDAQ, FTSE100, FTSE250, SP500]
        - name: dropRange
          in: query
          required: false
          description: "Filter by percentage drop range"
          schema:
            type: string
            enum: [up_to_10, 11_to_20, 21_to_30, 31_plus]
        - name: timePeriod
          in: query
          required: false
          description: "Time period for measuring the price drop"
          schema:
            type: string
            enum: [1h, 24h, 1w, 1m]
      responses:
        "200":
          description: List of securities matching the filter criteria
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecuritiesResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /securities/summary:
    get:
      operationId: getSecuritiesSummary
      tags: [securities]
      summary: Summary statistics of falling securities
      description: Returns aggregate counts of securities falling across drop ranges and asset types for the given time period
      parameters:
        - name: timePeriod
          in: query
          required: false
          description: "Time period for measuring the price drop"
          schema:
            type: string
            enum: [1h, 24h, 1w, 1m]
      responses:
        "200":
          description: Summary statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecuritiesSummary"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /securities/top-movers:
    get:
      operationId: getTopMovers
      tags: [securities]
      summary: Top falling securities
      description: Returns the top 10 biggest fallers across all markets for a given time period
      parameters:
        - name: timePeriod
          in: query
          required: false
          description: "Time period for measuring the price drop"
          schema:
            type: string
            enum: [1h, 24h, 1w, 1m]
        - name: assetType
          in: query
          required: false
          description: "Filter by asset type: equity or crypto"
          schema:
            type: string
            enum: [equity, crypto]
      responses:
        "200":
          description: Top falling securities
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TopMoversResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /securities/last-updated:
    get:
      operationId: getLastUpdated
      tags: [securities]
      summary: Get the timestamp of the last data refresh
      description: Returns when the cached price data was last fetched from the data provider
      responses:
        "200":
          description: Last update timestamp
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LastUpdated"

  /drop-cause:
    get:
      operationId: getDropCause
      tags: [drop-cause]
      summary: Classify why a security dropped
      description: >
        Returns a sector-relative move analysis and cause classification for a
        given ticker and time period. Uses existing news feed and benchmark ETF
        data. Cached 15 minutes. Equities only — crypto returns unknown classification.
        Decision-support signal only, not investment advice.
      parameters:
        - name: ticker
          in: query
          required: true
          description: Stock ticker symbol (e.g. AAPL, AZN)
          schema:
            type: string
        - name: period
          in: query
          required: false
          description: "Time period matching the scanner selection (default: 24h)"
          schema:
            type: string
            enum: [1h, 24h, 1w, 1m]
      responses:
        "200":
          description: Drop cause classification
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DropClassification"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /verdicts:
    get:
      operationId: getVerdicts
      tags: [verdicts]
      summary: Get valuation and fundamental verdicts for a batch of stock tickers
      description: Returns cheapness and fundamental momentum scores, plus a four-quadrant verdict for each requested ticker. Crypto tickers are ignored. Results are cached for 1 hour per ticker.
      parameters:
        - name: tickers
          in: query
          required: true
          description: "Comma-separated list of equity ticker symbols (max 30)"
          schema:
            type: string
      responses:
        "200":
          description: Map of ticker → verdict result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerdictsResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    PriceTarget:
      type: object
      required: [targetMedian, targetHigh, targetLow]
      properties:
        targetMedian:
          type: number
          description: Median analyst price target
        targetHigh:
          type: number
          description: Highest analyst price target
        targetLow:
          type: number
          description: Lowest analyst price target
        lastUpdated:
          type: string
          nullable: true
          description: Date string when targets were last updated (YYYY-MM-DD)

    NewsArticle:
      type: object
      required: [headline, source, publishedAt, url, sentiment]
      properties:
        headline:
          type: string
        source:
          type: string
        publishedAt:
          type: string
          description: ISO 8601 datetime string
        url:
          type: string
        sentiment:
          type: string
          enum: [positive, negative, neutral]
          description: Polygon-derived sentiment for this ticker in this article
        imageUrl:
          type: string
          description: Optional thumbnail image URL

    NewsResponse:
      type: object
      required: [articles]
      properties:
        articles:
          type: array
          items:
            $ref: "#/components/schemas/NewsArticle"

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Security:
      type: object
      required:
        - ticker
        - name
        - assetType
        - market
        - currentPrice
        - previousPrice
        - percentChange
        - timePeriod
        - currency
      properties:
        ticker:
          type: string
          description: Stock/crypto ticker symbol
        name:
          type: string
          description: Full name of the security
        assetType:
          type: string
          enum: [equity, crypto]
        market:
          type: string
          enum: [NASDAQ, FTSE100, FTSE250, SP500, CRYPTO]
        currentPrice:
          type: number
          description: Current price
        previousPrice:
          type: number
          description: Price at the start of the time period
        percentChange:
          type: number
          description: Percentage change (negative = drop)
        timePeriod:
          type: string
          enum: [1h, 24h, 1w, 1m]
        currency:
          type: string
          description: Currency code (USD, GBP, etc.)
        volume:
          type: ["number", "null"]
          description: Trading volume

    SecuritiesResponse:
      type: object
      required:
        - securities
        - total
        - lastUpdated
      properties:
        securities:
          type: array
          items:
            $ref: "#/components/schemas/Security"
        total:
          type: integer
          description: Total number of matching securities
        lastUpdated:
          type: string
          description: ISO timestamp of last data refresh

    DropRangeCount:
      type: object
      required:
        - range
        - count
      properties:
        range:
          type: string
          enum: [up_to_10, 11_to_20, 21_to_30, 31_plus]
        count:
          type: integer

    SecuritiesSummary:
      type: object
      required:
        - totalFalling
        - byDropRange
        - byAssetType
        - byMarket
        - timePeriod
        - lastUpdated
      properties:
        totalFalling:
          type: integer
          description: Total number of securities that are falling
        byDropRange:
          type: array
          items:
            $ref: "#/components/schemas/DropRangeCount"
        byAssetType:
          type: object
          properties:
            equity:
              type: integer
            crypto:
              type: integer
          required: [equity, crypto]
        byMarket:
          type: object
          properties:
            NASDAQ:
              type: integer
            FTSE100:
              type: integer
            FTSE250:
              type: integer
            SP500:
              type: integer
            CRYPTO:
              type: integer
          required: [NASDAQ, FTSE100, FTSE250, SP500, CRYPTO]
        timePeriod:
          type: string
          enum: [1h, 24h, 1w, 1m]
        lastUpdated:
          type: string

    TopMoversResponse:
      type: object
      required:
        - movers
        - timePeriod
        - lastUpdated
      properties:
        movers:
          type: array
          items:
            $ref: "#/components/schemas/Security"
        timePeriod:
          type: string
          enum: [1h, 24h, 1w, 1m]
        lastUpdated:
          type: string

    LastUpdated:
      type: object
      required:
        - timestamp
        - nextRefreshIn
      properties:
        timestamp:
          type: string
          description: ISO timestamp of last data refresh
        nextRefreshIn:
          type: integer
          description: Seconds until next scheduled refresh

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string

    # ── Verdict schemas ──────────────────────────────────────────────────────

    MultipleTag:
      type: string
      enum: [cheap, fair, expensive, missing]
      description: "How the multiple compares to sector median"

    MultipleResult:
      type: object
      required: [sectorMedian, tag]
      properties:
        value:
          type: ["number", "null"]
          description: Actual multiple value for this ticker
        sectorMedian:
          type: number
          description: Hardcoded sector median used for comparison
        tag:
          $ref: "#/components/schemas/MultipleTag"

    CheapnessResult:
      type: object
      required: [label, score, pe, ps, isUnprofitable, missingData]
      properties:
        label:
          type: string
          enum: [Cheap, Not Cheap]
        score:
          type: number
          description: Raw cheapness score (positive = cheap)
        pe:
          $ref: "#/components/schemas/MultipleResult"
        ps:
          $ref: "#/components/schemas/MultipleResult"
          description: Price-to-Sales vs sector median
        isUnprofitable:
          type: boolean
        missingData:
          type: array
          items:
            type: string

    EstimateRevisions:
      type: object
      required: [available]
      properties:
        available:
          type: boolean
        direction:
          type: string
          enum: [up, flat, down]
          description: Only present when available is true

    FundamentalsResult:
      type: object
      required: [label, score, estimateRevisions, revenueGrowthYoy, grossMarginTtm, missingData]
      properties:
        label:
          type: string
          enum: [Stable/Improving, Deteriorating]
        score:
          type: number
        estimateRevisions:
          $ref: "#/components/schemas/EstimateRevisions"
        revenueGrowthYoy:
          type: ["number", "null"]
          description: Revenue growth year-over-year TTM (percent, e.g. 70.68)
        grossMarginTtm:
          type: ["number", "null"]
          description: Gross margin TTM (percent, e.g. 74.15) — informational
        missingData:
          type: array
          items:
            type: string

    AnalystCounts:
      type: object
      required: [buy, hold, sell, consensus]
      properties:
        buy:
          type: integer
        hold:
          type: integer
        sell:
          type: integer
        consensus:
          type: string

    RoicResult:
      type: object
      required: [flag, note]
      properties:
        flag:
          type: string
          description: >
            ROIC quality tier — one shared definition for display labels and override logic.
            elite = ≥30% ROIC (full notch upgrade eligible);
            high = 20–30% (full notch eligible);
            value_creating = WACC_proxy < ROIC < 20% (soft notch only);
            marginal = around WACC_proxy (no override);
            value_destroying = below WACC_proxy − 3pts (no override);
            skipped = not applicable (Financials);
            missing = data unavailable.
          enum:
            - elite
            - high
            - value_creating
            - marginal
            - value_destroying
            - skipped
            - missing
        value:
          type: ["number", "null"]
          description: "ROIC as decimal (e.g. 0.16 = 16%). null for skipped/missing."
        note:
          type: string
          description: Human-readable tier interpretation for the detail view
        overrideRationale:
          type: ["string", "null"]
          description: >
            Generated rationale explaining the ROIC override decision, including the
            leverage interaction. Set when the modifier ran; null when ROIC is skipped/missing.

    DeBand:
      type: object
      required: [elevated, high]
      properties:
        elevated:
          type: number
          description: D/E at or below this threshold is considered "elevated" (not yet "high")
        high:
          type: number
          description: D/E above this threshold is classified "high"

    DeResult:
      type: object
      required: [flag, note]
      properties:
        flag:
          type: string
          enum: [distressed, normal, elevated, high, skipped, missing]
          description: >
            distressed = negative equity; normal = within sector-typical range;
            elevated = above normal, below high; high = significantly above norm;
            skipped = not meaningful for this sector (Financials);
            missing = data unavailable
        value:
          type: ["number", "null"]
          description: "Total D/E ratio (ratio form, e.g. 0.26 = 0.26×). null for skipped/missing."
        sectorBand:
          description: Sector-normal thresholds used for classification. null for skipped sectors.
          oneOf:
            - $ref: "#/components/schemas/DeBand"
            - type: "null"
        note:
          type: string
          description: Human-readable one-line interpretation for the detail view
        tag:
          type: string
          description: "Optional UI tag (e.g. 'High leverage', 'Negative shareholder equity — verify cause', 'Debt-free')"

    TickerVerdict:
      type: object
      required: [ticker, cheapness, fundamentals, explanation, missingData]
      properties:
        ticker:
          type: string
        verdict:
          type: ["string", "null"]
          description: >
            Final valuation verdict. "Overvalued (adjusted)" means the business earns
            above cost-of-capital (ROIC soft notch) but not strongly enough for a clean
            "At value" upgrade — quality awareness without unqualified upgrade.
          enum:
            - Undervalued
            - At value
            - Overvalued (adjusted)
            - Overvalued
            - "null"
        verdictBase:
          type: ["string", "null"]
          enum:
            - Undervalued
            - At value
            - Overvalued
            - "null"
          description: Verdict before any modifiers (ROIC, D/E) were applied
        verdictAfterRoic:
          type: ["string", "null"]
          enum:
            - Undervalued
            - At value
            - Overvalued (adjusted)
            - Overvalued
            - "null"
          description: Verdict after ROIC modifier, before D/E modifier. Equals final verdict when D/E had no effect.
        cheapness:
          $ref: "#/components/schemas/CheapnessResult"
        fundamentals:
          $ref: "#/components/schemas/FundamentalsResult"
        analysts:
          oneOf:
            - $ref: "#/components/schemas/AnalystCounts"
            - type: "null"
        roic:
          $ref: "#/components/schemas/RoicResult"
        de:
          $ref: "#/components/schemas/DeResult"
        priceTarget:
          oneOf:
            - $ref: "#/components/schemas/PriceTarget"
            - type: "null"
          description: Analyst consensus price target (median, high, low). Null when no coverage.
        explanation:
          type: string
        missingData:
          type: array
          items:
            type: string

    VerdictsResponse:
      type: object
      required: [verdicts]
      properties:
        verdicts:
          type: object
          additionalProperties:
            oneOf:
              - $ref: "#/components/schemas/TickerVerdict"
              - type: "null"

    # ── Drop-cause schemas ────────────────────────────────────────────────────

    DropEvidence:
      type: object
      required: [headline, source, url, published]
      properties:
        headline:
          type: string
          description: Article headline as displayed in the Recent News feed
        source:
          type: string
          description: News source name
        url:
          type: string
          description: Link to the article
        published:
          type: string
          description: ISO 8601 publish datetime

    DropCause:
      type: object
      required: [dominant, secondary, signal]
      properties:
        dominant:
          type: string
          enum:
            - sector_macro
            - technical_no_news
            - operational_stumble
            - thesis_impairment
            - secular_decline
            - solvency_stress
            - governance_accounting
            - corporate_action
            - unknown
          description: The single most likely cause category for the drop
        secondary:
          type: array
          items:
            type: string
            enum:
              - sector_macro
              - technical_no_news
              - operational_stumble
              - thesis_impairment
              - secular_decline
              - solvency_stress
              - governance_accounting
              - corporate_action
              - unknown
          description: Additional cause categories with weaker evidence
        signal:
          type: string
          enum: [green, amber, red, neutral]
          description: >
            Severity signal for colour coding.
            green = least concerning (sector move);
            amber = ambiguous — review warranted;
            red = likely deterioration — elevated concern;
            neutral = corporate action (context-dependent).

    DropClassification:
      type: object
      required:
        - ticker
        - asOf
        - period
        - sectorBenchmark
        - moveType
        - cause
        - confidence
        - evidenceAvailable
        - evidence
        - rationale
        - disclaimer
      properties:
        ticker:
          type: string
        asOf:
          type: string
          description: ISO 8601 timestamp when classification was computed
        period:
          type: string
          enum: [1h, 24h, 1w, 1m]
        stockReturn:
          type: ["number", "null"]
          description: Ticker's percent change over the period (negative = drop)
        sectorBenchmark:
          type: string
          description: ETF ticker used as sector benchmark (e.g. XLK, EWU, SPY)
        sectorReturn:
          type: ["number", "null"]
          description: Benchmark ETF percent change over the same period
        excessMove:
          type: ["number", "null"]
          description: >
            stockReturn − sectorReturn. Negative = fell more than sector (company-specific);
            near zero = moved with sector; positive = outperformed sector.
        moveType:
          type: string
          enum:
            - company_specific
            - market_driven
            - relative_outperformer
            - insufficient_data
          description: >
            company_specific: excess move ≤ −2% (fell materially more than sector);
            market_driven: within ±2%/+1% of sector;
            relative_outperformer: fell less than sector;
            insufficient_data: benchmark or price data unavailable.
        cause:
          $ref: "#/components/schemas/DropCause"
        confidence:
          type: string
          enum: [high, medium, low]
          description: >
            high = sector move computed AND news keyword match;
            medium = one of those;
            low = neither (price-only classification).
        evidenceAvailable:
          type: boolean
          description: True when at least one news article was found
        evidence:
          type: array
          items:
            $ref: "#/components/schemas/DropEvidence"
          description: News items from the existing feed that support the classification
        rationale:
          type: string
          description: Human-readable explanation of the classification
        disclaimer:
          type: string
          description: Always "Decision-support signal, not investment advice."
