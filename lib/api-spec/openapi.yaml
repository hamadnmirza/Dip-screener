openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification for Dip Tracker - securities that have fallen in price
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: securities
    description: Securities (equities and crypto) that have fallen in price
  - name: verdicts
    description: Valuation and fundamental momentum verdicts for stock tickers
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /securities:
    get:
      operationId: listSecurities
      tags: [securities]
      summary: List securities that have fallen in price
      description: Returns a filtered list of equities and crypto that have dropped by specified criteria. Data refreshes every 15 minutes.
      parameters:
        - name: assetType
          in: query
          required: false
          description: "Filter by asset type: equity or crypto"
          schema:
            type: string
            enum: [equity, crypto]
        - name: market
          in: query
          required: false
          description: "Filter by market/exchange"
          schema:
            type: string
            enum: [NASDAQ, FTSE100, FTSE250, SP500]
        - name: dropRange
          in: query
          required: false
          description: "Filter by percentage drop range"
          schema:
            type: string
            enum: [up_to_10, 11_to_20, 21_to_30, 31_plus]
        - name: timePeriod
          in: query
          required: false
          description: "Time period for measuring the price drop"
          schema:
            type: string
            enum: [1h, 24h, 1w, 1m]
      responses:
        "200":
          description: List of securities matching the filter criteria
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecuritiesResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /securities/summary:
    get:
      operationId: getSecuritiesSummary
      tags: [securities]
      summary: Summary statistics of falling securities
      description: Returns aggregate counts of securities falling across drop ranges and asset types for the given time period
      parameters:
        - name: timePeriod
          in: query
          required: false
          description: "Time period for measuring the price drop"
          schema:
            type: string
            enum: [1h, 24h, 1w, 1m]
      responses:
        "200":
          description: Summary statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecuritiesSummary"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /securities/top-movers:
    get:
      operationId: getTopMovers
      tags: [securities]
      summary: Top falling securities
      description: Returns the top 10 biggest fallers across all markets for a given time period
      parameters:
        - name: timePeriod
          in: query
          required: false
          description: "Time period for measuring the price drop"
          schema:
            type: string
            enum: [1h, 24h, 1w, 1m]
        - name: assetType
          in: query
          required: false
          description: "Filter by asset type: equity or crypto"
          schema:
            type: string
            enum: [equity, crypto]
      responses:
        "200":
          description: Top falling securities
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TopMoversResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /securities/last-updated:
    get:
      operationId: getLastUpdated
      tags: [securities]
      summary: Get the timestamp of the last data refresh
      description: Returns when the cached price data was last fetched from the data provider
      responses:
        "200":
          description: Last update timestamp
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LastUpdated"

  /verdicts:
    get:
      operationId: getVerdicts
      tags: [verdicts]
      summary: Get valuation and fundamental verdicts for a batch of stock tickers
      description: Returns cheapness and fundamental momentum scores, plus a four-quadrant verdict for each requested ticker. Crypto tickers are ignored. Results are cached for 1 hour per ticker.
      parameters:
        - name: tickers
          in: query
          required: true
          description: "Comma-separated list of equity ticker symbols (max 30)"
          schema:
            type: string
      responses:
        "200":
          description: Map of ticker → verdict result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerdictsResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Security:
      type: object
      required:
        - ticker
        - name
        - assetType
        - market
        - currentPrice
        - previousPrice
        - percentChange
        - timePeriod
        - currency
      properties:
        ticker:
          type: string
          description: Stock/crypto ticker symbol
        name:
          type: string
          description: Full name of the security
        assetType:
          type: string
          enum: [equity, crypto]
        market:
          type: string
          enum: [NASDAQ, FTSE100, FTSE250, SP500, CRYPTO]
        currentPrice:
          type: number
          description: Current price
        previousPrice:
          type: number
          description: Price at the start of the time period
        percentChange:
          type: number
          description: Percentage change (negative = drop)
        timePeriod:
          type: string
          enum: [1h, 24h, 1w, 1m]
        currency:
          type: string
          description: Currency code (USD, GBP, etc.)
        volume:
          type: ["number", "null"]
          description: Trading volume

    SecuritiesResponse:
      type: object
      required:
        - securities
        - total
        - lastUpdated
      properties:
        securities:
          type: array
          items:
            $ref: "#/components/schemas/Security"
        total:
          type: integer
          description: Total number of matching securities
        lastUpdated:
          type: string
          description: ISO timestamp of last data refresh

    DropRangeCount:
      type: object
      required:
        - range
        - count
      properties:
        range:
          type: string
          enum: [up_to_10, 11_to_20, 21_to_30, 31_plus]
        count:
          type: integer

    SecuritiesSummary:
      type: object
      required:
        - totalFalling
        - byDropRange
        - byAssetType
        - byMarket
        - timePeriod
        - lastUpdated
      properties:
        totalFalling:
          type: integer
          description: Total number of securities that are falling
        byDropRange:
          type: array
          items:
            $ref: "#/components/schemas/DropRangeCount"
        byAssetType:
          type: object
          properties:
            equity:
              type: integer
            crypto:
              type: integer
          required: [equity, crypto]
        byMarket:
          type: object
          properties:
            NASDAQ:
              type: integer
            FTSE100:
              type: integer
            FTSE250:
              type: integer
            SP500:
              type: integer
            CRYPTO:
              type: integer
          required: [NASDAQ, FTSE100, FTSE250, SP500, CRYPTO]
        timePeriod:
          type: string
          enum: [1h, 24h, 1w, 1m]
        lastUpdated:
          type: string

    TopMoversResponse:
      type: object
      required:
        - movers
        - timePeriod
        - lastUpdated
      properties:
        movers:
          type: array
          items:
            $ref: "#/components/schemas/Security"
        timePeriod:
          type: string
          enum: [1h, 24h, 1w, 1m]
        lastUpdated:
          type: string

    LastUpdated:
      type: object
      required:
        - timestamp
        - nextRefreshIn
      properties:
        timestamp:
          type: string
          description: ISO timestamp of last data refresh
        nextRefreshIn:
          type: integer
          description: Seconds until next scheduled refresh

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string

    # ── Verdict schemas ──────────────────────────────────────────────────────

    MultipleTag:
      type: string
      enum: [cheap, fair, expensive, missing]
      description: "How the multiple compares to sector median"

    MultipleResult:
      type: object
      required: [sectorMedian, tag]
      properties:
        value:
          type: ["number", "null"]
          description: Actual multiple value for this ticker
        sectorMedian:
          type: number
          description: Hardcoded sector median used for comparison
        tag:
          $ref: "#/components/schemas/MultipleTag"

    CheapnessResult:
      type: object
      required: [label, score, pe, ps, isUnprofitable, missingData]
      properties:
        label:
          type: string
          enum: [Cheap, Not Cheap]
        score:
          type: number
          description: Raw cheapness score (positive = cheap)
        pe:
          $ref: "#/components/schemas/MultipleResult"
        ps:
          $ref: "#/components/schemas/MultipleResult"
          description: Price-to-Sales vs sector median
        isUnprofitable:
          type: boolean
        missingData:
          type: array
          items:
            type: string

    EstimateRevisions:
      type: object
      required: [available]
      properties:
        available:
          type: boolean
        direction:
          type: string
          enum: [up, flat, down]
          description: Only present when available is true

    FundamentalsResult:
      type: object
      required: [label, score, estimateRevisions, revenueGrowthYoy, grossMarginTtm, missingData]
      properties:
        label:
          type: string
          enum: [Stable/Improving, Deteriorating]
        score:
          type: number
        estimateRevisions:
          $ref: "#/components/schemas/EstimateRevisions"
        revenueGrowthYoy:
          type: ["number", "null"]
          description: Revenue growth year-over-year TTM (percent, e.g. 70.68)
        grossMarginTtm:
          type: ["number", "null"]
          description: Gross margin TTM (percent, e.g. 74.15) — informational
        missingData:
          type: array
          items:
            type: string

    AnalystCounts:
      type: object
      required: [buy, hold, sell, consensus]
      properties:
        buy:
          type: integer
        hold:
          type: integer
        sell:
          type: integer
        consensus:
          type: string

    TickerVerdict:
      type: object
      required: [ticker, cheapness, fundamentals, explanation, missingData]
      properties:
        ticker:
          type: string
        verdict:
          type: ["string", "null"]
          enum:
            - Undervalued
            - At value
            - Overvalued
            - "null"
        cheapness:
          $ref: "#/components/schemas/CheapnessResult"
        fundamentals:
          $ref: "#/components/schemas/FundamentalsResult"
        analysts:
          oneOf:
            - $ref: "#/components/schemas/AnalystCounts"
            - type: "null"
        explanation:
          type: string
        missingData:
          type: array
          items:
            type: string

    VerdictsResponse:
      type: object
      required: [verdicts]
      properties:
        verdicts:
          type: object
          additionalProperties:
            oneOf:
              - $ref: "#/components/schemas/TickerVerdict"
              - type: "null"
